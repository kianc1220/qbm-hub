<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deposit Tracker · DJI QBM</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2230;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.12);
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #e00;
      --accent2: #ff3333;
      --green: #4ade80;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #a78bfa;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 56px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,17,23,0.92); backdrop-filter: blur(12px); z-index: 100; }
    .nav-back { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
    .nav-back:hover { color: var(--text); }
    .nav-title { font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .nav-brand { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; }

    /* LOADING */
    #loading-screen { display: flex; align-items: center; justify-content: center; height: calc(100vh - 56px); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MAIN */
    #app { display: none; max-width: 900px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.7rem; font-weight: 700; line-height: 1; }
    .stat-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .stat-value.red { color: var(--red); }
    .stat-value.green { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }

    /* TABS */
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 1.25rem; }
    .tab-btn { flex: 1; padding: 0.55rem 1rem; border: none; background: none; color: var(--text-muted); font-size: 0.875rem; font-weight: 500; border-radius: 9px; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { background: var(--surface2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .tab-panel { animation: fadeSlideUp 0.35s cubic-bezier(.22,1,.36,1) both; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* TOOLBAR */
    .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.35rem 0.85rem; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; }
    .btn-add { padding: 0.45rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-add:hover { background: var(--accent2); }

    /* DEPOSIT CARDS */
    .deposit-list { display: flex; flex-direction: column; gap: 10px; }
    .deposit-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; transition: border-color 0.15s; }
    .deposit-card.overdue { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.04); }
    .deposit-card.due-today { border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.04); }
    .deposit-card.due-soon { border-color: rgba(251,146,60,0.3); }
    .deposit-card.collected { opacity: 0.6; }
    .deposit-card.cancelled { opacity: 0.45; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.6rem; }
    .card-customer { font-weight: 600; font-size: 0.95rem; }
    .card-phone { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
    .card-product { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.65rem; }

    .card-money { display: flex; gap: 1.5rem; margin-bottom: 0.65rem; flex-wrap: wrap; }
    .money-item { }
    .money-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .money-value { font-size: 1rem; font-weight: 700; margin-top: 1px; }
    .money-value.deposit-amt { color: var(--yellow); }
    .money-value.balance-amt { color: var(--red); }
    .money-value.total-amt { color: var(--text); }

    .card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .badge-pending { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
    .badge-collected { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.22); }
    .badge-cancelled { background: rgba(139,148,158,0.12); color: var(--text-muted); border: 1px solid rgba(139,148,158,0.2); }
    .badge-overdue { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
    .badge-today { background: rgba(251,191,36,0.18); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
    .badge-soon { background: rgba(251,146,60,0.12); color: var(--orange); border: 1px solid rgba(251,146,60,0.22); }
    .badge-salesman { background: rgba(96,165,250,0.1); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }

    .date-info { font-size: 0.78rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .date-info.overdue { color: var(--red); font-weight: 600; }
    .date-info.today { color: var(--yellow); font-weight: 600; }

    .card-actions { margin-left: auto; display: flex; gap: 6px; }
    .btn-collect { padding: 0.3rem 0.75rem; background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.22); border-radius: 7px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-collect:hover { background: rgba(74,222,128,0.22); }
    .btn-icon { padding: 0.3rem 0.6rem; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: 7px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .btn-icon:hover { color: var(--text); border-color: var(--border2); }
    .btn-icon.del:hover { color: var(--red); border-color: rgba(248,113,113,0.3); }

    /* BANK DEPOSITS */
    .bank-month { margin-bottom: 1.5rem; }
    .bank-month-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .bank-month-name { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .bank-month-total { font-size: 0.85rem; font-weight: 700; color: var(--green); }
    .bank-row { display: flex; align-items: center; gap: 12px; padding: 0.7rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
    .bank-date { font-size: 0.82rem; color: var(--text-muted); min-width: 70px; }
    .bank-amount { font-size: 1rem; font-weight: 700; color: var(--green); min-width: 100px; }
    .bank-bank { font-size: 0.82rem; color: var(--text); }
    .bank-ref { font-size: 0.78rem; color: var(--text-muted); }
    .bank-notes { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
    .bank-actions { margin-left: auto; display: flex; gap: 6px; }

    /* EMPTY */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.9rem; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 1.75rem; }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }

    .type-toggle { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 1.25rem; }
    .type-btn { flex: 1; padding: 0.45rem; border: none; background: none; color: var(--text-muted); font-size: 0.82rem; font-weight: 500; border-radius: 7px; cursor: pointer; transition: all 0.15s; }
    .type-btn.active { background: var(--surface2); color: var(--text); }

    .form-group { margin-bottom: 1rem; }
    .form-label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 5px; display: block; font-weight: 500; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 0.6rem 0.85rem; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text); font-size: 0.88rem; outline: none; transition: border-color 0.15s; font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { min-height: 70px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-hint { font-size: 0.74rem; color: var(--text-muted); margin-top: 4px; }

    .balance-display { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.85rem; font-size: 0.88rem; color: var(--text-muted); }
    .balance-display span { font-weight: 700; color: var(--red); }

    .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .btn-primary { flex: 1; padding: 0.65rem; background: var(--accent); color: #fff; border: none; border-radius: 9px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-secondary { padding: 0.65rem 1.25rem; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: 9px; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
    .btn-secondary:hover { color: var(--text); border-color: var(--border2); }

    /* TOAST */
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 0.65rem 1.25rem; font-size: 0.85rem; font-weight: 500; z-index: 999; transition: transform 0.3s cubic-bezier(.22,1,.36,1); white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(74,222,128,0.3); color: var(--green); }
    #toast.error { border-color: rgba(248,113,113,0.3); color: var(--red); }

    /* MOBILE */
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .card-money { gap: 1rem; }
      .card-actions { width: 100%; margin-left: 0; margin-top: 0.5rem; }
      .nav { padding: 0 1rem; }
      #app { padding: 1rem 0.85rem 3rem; }
      .bank-row { flex-wrap: wrap; }
      .bank-actions { width: 100%; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Hub
  </a>
  <div class="nav-title">💰 Deposit Tracker</div>
  <div class="nav-brand">DJI QBM</div>
</nav>

<div id="loading-screen">
  <div class="spinner"></div>
</div>

<div id="app">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Active Orders</div>
      <div class="stat-value" id="sv-active">–</div>
      <div class="stat-sub">pending collection</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Deposits Held</div>
      <div class="stat-value yellow" id="sv-held">–</div>
      <div class="stat-sub">total deposit money</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Overdue</div>
      <div class="stat-value" id="sv-overdue">–</div>
      <div class="stat-sub">past collection date</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Bank This Month</div>
      <div class="stat-value green" id="sv-bank">–</div>
      <div class="stat-sub">total deposited</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('preorders')">📋 Pre-orders</button>
    <button class="tab-btn" onclick="switchTab('bank')">🏦 Bank Deposits</button>
  </div>

  <!-- PRE-ORDERS TAB -->
  <div id="tab-preorders" class="tab-panel">
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('overdue',this)">Overdue</button>
      <button class="filter-btn" onclick="setFilter('collected',this)">Collected</button>
      <button class="filter-btn" onclick="setFilter('cancelled',this)">Cancelled</button>
      <div class="toolbar-right">
        <button class="btn-add" onclick="openModal('preorder')">+ New Deposit</button>
      </div>
    </div>
    <div class="deposit-list" id="preorder-list"></div>
  </div>

  <!-- BANK DEPOSITS TAB -->
  <div id="tab-bank" class="tab-panel" style="display:none;">
    <div class="toolbar">
      <div class="toolbar-right">
        <button class="btn-add" onclick="openModal('bank')">+ Record Deposit</button>
      </div>
    </div>
    <div id="bank-list"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <span id="modal-title-text">New Deposit</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <!-- TYPE TOGGLE (only for new) -->
    <div class="type-toggle" id="type-toggle">
      <button class="type-btn active" id="type-preorder-btn" onclick="setModalType('preorder')">📋 Pre-order</button>
      <button class="type-btn" id="type-bank-btn" onclick="setModalType('bank')">🏦 Bank Deposit</button>
    </div>

    <!-- PRE-ORDER FORM -->
    <div id="form-preorder">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Customer Name *</label>
          <input class="form-input" id="f-customer" placeholder="e.g. Ahmad Bin Ali" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="f-phone" placeholder="012-345 6789" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Product *</label>
        <input class="form-input" id="f-product" list="product-list" placeholder="e.g. DJI Mini 4 Pro Fly More Combo" />
        <datalist id="product-list">
          <option value="DJI Neo"></option>
          <option value="DJI Neo Fly More Combo"></option>
          <option value="DJI Mini 4 Pro"></option>
          <option value="DJI Mini 4 Pro Fly More Combo"></option>
          <option value="DJI Mini 4 Pro Fly More Combo Plus"></option>
          <option value="DJI Air 3"></option>
          <option value="DJI Air 3 Fly More Combo"></option>
          <option value="DJI Air 3S"></option>
          <option value="DJI Air 3S Fly More Combo"></option>
          <option value="DJI Mavic 3 Pro"></option>
          <option value="DJI Mavic 3 Pro Fly More Combo"></option>
          <option value="DJI Mavic 3 Classic"></option>
          <option value="DJI Avata 2"></option>
          <option value="DJI Avata 2 Fly More Combo"></option>
          <option value="DJI Osmo Mobile 7"></option>
          <option value="DJI Osmo Mobile 7P"></option>
          <option value="DJI RS 4"></option>
          <option value="DJI RS 4 Pro"></option>
          <option value="DJI RS 4 Mini"></option>
          <option value="DJI Goggles 3"></option>
          <option value="DJI RC 2"></option>
          <option value="DJI RC Pro"></option>
        </datalist>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Total Price (RM) *</label>
          <input class="form-input" id="f-total" type="number" min="0" step="1" placeholder="3499" oninput="updateBalance()" />
        </div>
        <div class="form-group">
          <label class="form-label">Deposit Paid (RM) *</label>
          <input class="form-input" id="f-deposit" type="number" min="0" step="1" placeholder="500" oninput="updateBalance()" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Balance Due</label>
        <div class="balance-display">RM <span id="f-balance">–</span></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Salesman</label>
          <input class="form-input" id="f-salesman" list="salesman-list" placeholder="e.g. Khairul" />
          <datalist id="salesman-list">
            <option value="Khairul"></option>
            <option value="KC"></option>
            <option value="Desmond"></option>
          </datalist>
        </div>
        <div class="form-group">
          <label class="form-label">Order Date</label>
          <input class="form-input" id="f-orderdate" type="date" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Expected Collection Date *</label>
        <input class="form-input" id="f-collectdate" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="f-notes" placeholder="Any additional info…"></textarea>
      </div>
    </div>

    <!-- BANK DEPOSIT FORM -->
    <div id="form-bank" style="display:none;">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input class="form-input" id="fb-date" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label">Amount (RM) *</label>
          <input class="form-input" id="fb-amount" type="number" min="0" step="0.01" placeholder="5000.00" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Bank</label>
          <input class="form-input" id="fb-bank" list="bank-list" placeholder="e.g. Maybank" />
          <datalist id="bank-list">
            <option value="Maybank"></option>
            <option value="CIMB"></option>
            <option value="Public Bank"></option>
            <option value="RHB Bank"></option>
            <option value="Hong Leong Bank"></option>
            <option value="AmBank"></option>
          </datalist>
        </div>
        <div class="form-group">
          <label class="form-label">Reference No.</label>
          <input class="form-input" id="fb-ref" placeholder="TXN12345" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="fb-notes" placeholder="Any additional info…"></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-save-btn" onclick="saveDeposit()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => { regs.forEach(r => r.unregister()); });
}

const API = '/.netlify/functions/deposits-api';
let deposits = [];
let currentTab = 'preorders';
let currentFilter = 'all';
let editingId = null;
let modalType = 'preorder';

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', async () => {
  setTimeout(() => {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll();
  }, 8000);

  try {
    const res = await Promise.race([
      fetch(API + '?action=list'),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 12000))
    ]);
    if (res.ok) deposits = await res.json();
  } catch {}

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderAll();

  // Set default dates
  document.getElementById('f-orderdate').value = today();
  document.getElementById('fb-date').value = today();
});

function today() {
  return new Date().toISOString().split('T')[0];
}

/* ── TABS ── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  ['preorders', 'bank'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    el.style.display = t === tab ? 'block' : 'none';
    if (t === tab) { el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''; }
  });
}

/* ── FILTER ── */
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPreorders();
}

/* ── RENDER ALL ── */
function renderAll() {
  renderStats();
  renderPreorders();
  renderBank();
}

/* ── STATS ── */
function renderStats() {
  const now = today();
  const preorders = deposits.filter(d => d.type === 'preorder');
  const active = preorders.filter(d => d.status === 'pending');
  const overdue = active.filter(d => d.collectionDate && d.collectionDate < now);
  const held = active.reduce((s, d) => s + (parseFloat(d.depositPaid) || 0), 0);

  const thisMonth = new Date().toISOString().slice(0, 7);
  const bankTotal = deposits
    .filter(d => d.type === 'bank' && (d.date || '').startsWith(thisMonth))
    .reduce((s, d) => s + (parseFloat(d.amount) || 0), 0);

  document.getElementById('sv-active').textContent = active.length;
  document.getElementById('sv-held').textContent = 'RM ' + held.toLocaleString('en-MY', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  document.getElementById('sv-overdue').textContent = overdue.length;
  document.getElementById('sv-overdue').className = 'stat-value' + (overdue.length > 0 ? ' red' : '');
  document.getElementById('sv-bank').textContent = 'RM ' + bankTotal.toLocaleString('en-MY', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

/* ── PRE-ORDERS ── */
function renderPreorders() {
  const now = today();
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().split('T')[0];

  let list = deposits.filter(d => d.type === 'preorder');

  if (currentFilter === 'pending') list = list.filter(d => d.status === 'pending' && (!d.collectionDate || d.collectionDate >= now));
  else if (currentFilter === 'overdue') list = list.filter(d => d.status === 'pending' && d.collectionDate && d.collectionDate < now);
  else if (currentFilter === 'collected') list = list.filter(d => d.status === 'collected');
  else if (currentFilter === 'cancelled') list = list.filter(d => d.status === 'cancelled');

  // Sort: overdue first, then by collection date
  list.sort((a, b) => {
    if (a.status === 'pending' && b.status !== 'pending') return -1;
    if (b.status === 'pending' && a.status !== 'pending') return 1;
    return (a.collectionDate || '') < (b.collectionDate || '') ? -1 : 1;
  });

  const el = document.getElementById('preorder-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No deposits here yet.</p></div>`;
    return;
  }

  el.innerHTML = list.map(dep => {
    const isOverdue = dep.status === 'pending' && dep.collectionDate && dep.collectionDate < now;
    const isToday = dep.status === 'pending' && dep.collectionDate === now;
    const isSoon = dep.status === 'pending' && dep.collectionDate === tomorrowStr;
    const balance = (parseFloat(dep.totalPrice) || 0) - (parseFloat(dep.depositPaid) || 0);

    let cardClass = 'deposit-card';
    if (dep.status === 'collected') cardClass += ' collected';
    else if (dep.status === 'cancelled') cardClass += ' cancelled';
    else if (isOverdue) cardClass += ' overdue';
    else if (isToday) cardClass += ' due-today';
    else if (isSoon) cardClass += ' due-soon';

    let statusBadge = '';
    if (dep.status === 'collected') statusBadge = `<span class="badge badge-collected">✓ Collected</span>`;
    else if (dep.status === 'cancelled') statusBadge = `<span class="badge badge-cancelled">Cancelled</span>`;
    else if (isOverdue) statusBadge = `<span class="badge badge-overdue">⚠ Overdue</span>`;
    else if (isToday) statusBadge = `<span class="badge badge-today">Today</span>`;
    else if (isSoon) statusBadge = `<span class="badge badge-soon">Tomorrow</span>`;
    else statusBadge = `<span class="badge badge-pending">Pending</span>`;

    const dateLabel = dep.collectionDate ? formatDate(dep.collectionDate) : '–';
    const dateClass = isOverdue ? 'date-info overdue' : isToday ? 'date-info today' : 'date-info';

    const actions = dep.status === 'pending' ? `
      <button class="btn-collect" onclick="markCollected('${dep.id}')">✓ Collected</button>
      <button class="btn-icon" onclick="openEdit('${dep.id}')" title="Edit">✎</button>
      <button class="btn-icon del" onclick="deleteDeposit('${dep.id}')" title="Delete">✕</button>
    ` : `
      <button class="btn-icon" onclick="openEdit('${dep.id}')" title="Edit">✎</button>
      <button class="btn-icon del" onclick="deleteDeposit('${dep.id}')" title="Delete">✕</button>
    `;

    return `
      <div class="${cardClass}">
        <div class="card-header">
          <div>
            <div class="card-customer">${esc(dep.customer || '–')}</div>
            ${dep.phone ? `<div class="card-phone">${esc(dep.phone)}</div>` : ''}
          </div>
          <div class="card-actions">${actions}</div>
        </div>
        <div class="card-product">${esc(dep.product || '–')}</div>
        <div class="card-money">
          <div class="money-item">
            <div class="money-label">Deposit Paid</div>
            <div class="money-value deposit-amt">RM ${fmt(dep.depositPaid)}</div>
          </div>
          <div class="money-item">
            <div class="money-label">Balance Due</div>
            <div class="money-value balance-amt">RM ${fmt(balance)}</div>
          </div>
          <div class="money-item">
            <div class="money-label">Total</div>
            <div class="money-value total-amt">RM ${fmt(dep.totalPrice)}</div>
          </div>
        </div>
        <div class="card-footer">
          ${statusBadge}
          ${dep.salesman ? `<span class="badge badge-salesman">${esc(dep.salesman)}</span>` : ''}
          ${dep.collectionDate ? `<span class="${dateClass}">📅 ${dateLabel}</span>` : ''}
          ${dep.notes ? `<span class="date-info" style="font-style:italic">· ${esc(dep.notes)}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

/* ── BANK DEPOSITS ── */
function renderBank() {
  const bankDeps = deposits.filter(d => d.type === 'bank').sort((a, b) => (b.date || '') < (a.date || '') ? -1 : 1);
  const el = document.getElementById('bank-list');

  if (!bankDeps.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏦</div><p>No bank deposits recorded yet.</p></div>`;
    return;
  }

  // Group by month
  const groups = {};
  bankDeps.forEach(d => {
    const month = (d.date || '').slice(0, 7);
    if (!groups[month]) groups[month] = [];
    groups[month].push(d);
  });

  el.innerHTML = Object.entries(groups).sort((a, b) => b[0] < a[0] ? -1 : 1).map(([month, rows]) => {
    const total = rows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
    const [yr, mo] = month.split('-');
    const monthName = new Date(yr, mo - 1).toLocaleString('en-MY', { month: 'long', year: 'numeric' });

    return `
      <div class="bank-month">
        <div class="bank-month-header">
          <span class="bank-month-name">${monthName}</span>
          <span class="bank-month-total">RM ${total.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
        </div>
        ${rows.sort((a,b) => b.date < a.date ? -1 : 1).map(d => `
          <div class="bank-row">
            <span class="bank-date">${formatDate(d.date)}</span>
            <span class="bank-amount">RM ${parseFloat(d.amount || 0).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
            <span class="bank-bank">${esc(d.bank || '–')}</span>
            ${d.reference ? `<span class="bank-ref">#${esc(d.reference)}</span>` : ''}
            ${d.notes ? `<span class="bank-notes">${esc(d.notes)}</span>` : ''}
            <div class="bank-actions">
              <button class="btn-icon" onclick="openEdit('${d.id}')" title="Edit">✎</button>
              <button class="btn-icon del" onclick="deleteDeposit('${d.id}')" title="Delete">✕</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

/* ── MODAL ── */
function openModal(type) {
  editingId = null;
  modalType = type || 'preorder';
  document.getElementById('modal-title-text').textContent = modalType === 'bank' ? 'Record Bank Deposit' : 'New Customer Deposit';
  document.getElementById('type-toggle').style.display = 'flex';
  setModalType(modalType);
  clearForm();
  document.getElementById('modal-overlay').style.display = 'flex';
}

function openEdit(id) {
  const dep = deposits.find(d => d.id === id);
  if (!dep) return;
  editingId = id;
  modalType = dep.type;
  document.getElementById('modal-title-text').textContent = 'Edit Deposit';
  document.getElementById('type-toggle').style.display = 'none';
  setModalType(dep.type);
  populateForm(dep);
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  editingId = null;
}

function setModalType(type) {
  modalType = type;
  document.getElementById('form-preorder').style.display = type === 'preorder' ? 'block' : 'none';
  document.getElementById('form-bank').style.display = type === 'bank' ? 'block' : 'none';
  document.getElementById('type-preorder-btn').classList.toggle('active', type === 'preorder');
  document.getElementById('type-bank-btn').classList.toggle('active', type === 'bank');
}

function clearForm() {
  ['f-customer','f-phone','f-product','f-total','f-deposit','f-salesman','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-balance').textContent = '–';
  document.getElementById('f-orderdate').value = today();
  document.getElementById('f-collectdate').value = '';
  ['fb-amount','fb-bank','fb-ref','fb-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('fb-date').value = today();
}

function populateForm(dep) {
  if (dep.type === 'preorder') {
    setValue('f-customer', dep.customer);
    setValue('f-phone', dep.phone);
    setValue('f-product', dep.product);
    setValue('f-total', dep.totalPrice);
    setValue('f-deposit', dep.depositPaid);
    setValue('f-salesman', dep.salesman);
    setValue('f-orderdate', dep.orderDate);
    setValue('f-collectdate', dep.collectionDate);
    setValue('f-notes', dep.notes);
    updateBalance();
  } else {
    setValue('fb-date', dep.date);
    setValue('fb-amount', dep.amount);
    setValue('fb-bank', dep.bank);
    setValue('fb-ref', dep.reference);
    setValue('fb-notes', dep.notes);
  }
}

function setValue(id, val) {
  const el = document.getElementById(id);
  if (el && val !== undefined && val !== null) el.value = val;
}

function updateBalance() {
  const total = parseFloat(document.getElementById('f-total').value) || 0;
  const dep = parseFloat(document.getElementById('f-deposit').value) || 0;
  const balance = total - dep;
  document.getElementById('f-balance').textContent = balance.toLocaleString('en-MY', { minimumFractionDigits: 0 });
}

async function saveDeposit() {
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  let body;
  if (modalType === 'preorder') {
    const customer = document.getElementById('f-customer').value.trim();
    const product = document.getElementById('f-product').value.trim();
    const total = parseFloat(document.getElementById('f-total').value);
    const dep = parseFloat(document.getElementById('f-deposit').value);
    const collectDate = document.getElementById('f-collectdate').value;

    if (!customer || !product || isNaN(total) || isNaN(dep) || !collectDate) {
      showToast('Please fill in all required fields.', 'error');
      btn.disabled = false; btn.textContent = 'Save'; return;
    }
    body = {
      type: 'preorder',
      customer,
      phone: document.getElementById('f-phone').value.trim(),
      product,
      totalPrice: total,
      depositPaid: dep,
      salesman: document.getElementById('f-salesman').value.trim(),
      orderDate: document.getElementById('f-orderdate').value,
      collectionDate: collectDate,
      notes: document.getElementById('f-notes').value.trim(),
      status: editingId ? deposits.find(d => d.id === editingId)?.status || 'pending' : 'pending',
    };
  } else {
    const amount = parseFloat(document.getElementById('fb-amount').value);
    const date = document.getElementById('fb-date').value;
    if (!date || isNaN(amount)) {
      showToast('Please enter a date and amount.', 'error');
      btn.disabled = false; btn.textContent = 'Save'; return;
    }
    body = {
      type: 'bank',
      date,
      amount,
      bank: document.getElementById('fb-bank').value.trim(),
      reference: document.getElementById('fb-ref').value.trim(),
      notes: document.getElementById('fb-notes').value.trim(),
    };
  }

  try {
    const action = editingId ? 'update' : 'add';
    if (editingId) body.id = editingId;
    const res = await fetch(`${API}?action=${action}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await res.json();
    if (d.ok) {
      if (editingId) {
        const idx = deposits.findIndex(x => x.id === editingId);
        if (idx !== -1) deposits[idx] = { ...deposits[idx], ...body };
      } else {
        deposits.unshift(d.deposit || body);
      }
      showToast(editingId ? 'Updated!' : 'Saved!', 'success');
      closeModal();
      renderAll();
    } else {
      showToast(d.error || 'Failed to save.', 'error');
    }
  } catch {
    showToast('Network error.', 'error');
  }

  btn.disabled = false; btn.textContent = 'Save';
}

async function markCollected(id) {
  if (!confirm('Mark this deposit as collected?')) return;
  try {
    const res = await fetch(API + '?action=collect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    const d = await res.json();
    if (d.ok) {
      const dep = deposits.find(x => x.id === id);
      if (dep) { dep.status = 'collected'; dep.collectedAt = new Date().toISOString(); }
      showToast('Marked as collected!', 'success');
      renderAll();
    } else {
      showToast('Failed to update.', 'error');
    }
  } catch {
    showToast('Network error.', 'error');
  }
}

async function deleteDeposit(id) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  try {
    const res = await fetch(API + '?action=delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    const d = await res.json();
    if (d.ok) {
      deposits = deposits.filter(x => x.id !== id);
      showToast('Deleted.', 'success');
      renderAll();
    } else {
      showToast('Failed to delete.', 'error');
    }
  } catch {
    showToast('Network error.', 'error');
  }
}

/* ── HELPERS ── */
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(val) {
  const n = parseFloat(val) || 0;
  return n.toLocaleString('en-MY', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function formatDate(str) {
  if (!str) return '–';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: 'numeric' });
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 2800);
}
</script>
