<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · QBM Operator Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-light: #3b82f6;
      --blue-bright: #60a5fa;
      --bg: #060a12;
      --surface: #0d1422;
      --border: rgba(255,255,255,0.07);
      --text: #f1f5f9;
      --muted: #64748b;
      --muted2: #94a3b8;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 440px;
      width: 100%;
    }

    .code {
      font-size: clamp(80px, 22vw, 120px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      background: linear-gradient(135deg, #2563eb 0%, #60a5fa 60%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .emoji {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: var(--muted2);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.18s;
      border: 1px solid var(--border);
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .btn-primary:hover { background: var(--blue-light); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: rgba(96,165,250,0.3); background: #131b2e; }

    .btn-ghost {
      background: rgba(37,99,235,0.08);
      color: var(--blue-bright);
      border-color: rgba(37,99,235,0.2);
    }
    .btn-ghost:hover { background: rgba(37,99,235,0.14); }

    .btn-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .btn-arrow {
      font-size: 16px;
      opacity: 0.7;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 8px auto;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--muted2); }
  </style>
</head>
<body>

<div class="content">
  <div class="code">404</div>
  <span class="emoji">🔍</span>
  <h1>Page not found</h1>
  <p>This page doesn't exist or may have been moved.<br/>Head back to one of the tools below.</p>

  <div class="links">
    <a href="/" class="btn btn-secondary">
      <div class="btn-label">
        <div class="btn-icon">🏠</div>
        <span>Operator Hub Home</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>
    <a href="/storedash" class="btn btn-primary">
      <div class="btn-label">
        <div class="btn-icon">📊</div>
        <span>StoreDash</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>
    <a href="/workshop/" class="btn btn-ghost">
      <div class="btn-label">
        <div class="btn-icon">🎓</div>
        <span>Workshop Hub</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <a href="javascript:history.back()" class="back-link">← Go back</a>
</div>

</body>
</html>
